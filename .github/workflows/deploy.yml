name: Deploy Databricks Bundle

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Bundle target (must exist in databricks.yml)"
        required: true
        default: "dev"

permissions:
  contents: read

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout UI repo into ./_ui
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.UI_REPO }}
          ref: ${{ secrets.UI_REF || 'main' }}
          path: _ui

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: _ui/package-lock.json

      - name: Build UI (npm ci + npm run build)
        working-directory: _ui
        run: |
          npm ci
          npm run build

      - name: Copy UI dist into backend ./static
        run: |
          rm -rf static
          mkdir -p static
          cp -R _ui/dist/. static/

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v0.296.0

      - name: Validate bundle
        run: databricks bundle validate
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_BUNDLE_ENV: ${{ github.event.inputs.target || 'dev' }}

      - name: Deploy bundle
        run: databricks bundle deploy
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_BUNDLE_ENV: ${{ github.event.inputs.target || 'dev' }}

