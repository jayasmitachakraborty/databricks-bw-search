# Secrets/vars: UI_REPO, UI_REF, UI_PACKAGE_PATH (optional), UI_REPO_TOKEN (optional);
# DATABRICKS_HOST, DATABRICKS_TOKEN, DATABRICKS_BUNDLE_VAR_SQL_WAREHOUSE_ID (GitHub Environment).

name: Deploy Databricks Bundle

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Bundle target (must exist in databricks.yml)"
        required: true
        default: "dev"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment: ${{ github.event.inputs.target || 'dev' }}
    env:
      DATABRICKS_BUNDLE_ENV: ${{ github.event.inputs.target || 'dev' }}
      DATABRICKS_HOST: ${{ vars.DATABRICKS_HOST }}
      DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
      BUNDLE_VAR_SQL_WAREHOUSE_ID: ${{ vars.DATABRICKS_BUNDLE_VAR_SQL_WAREHOUSE_ID }}

    steps:
      - name: Checkout backend bundle
        uses: actions/checkout@v4

      - name: Checkout frontend repo
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.UI_REPO }}
          ref: ${{ secrets.UI_REF || 'main' }}
          path: _ui
          token: ${{ secrets.UI_REPO_TOKEN || github.token }}

      - name: Resolve UI package directory
        env:
          UI_PACKAGE_PATH: ${{ secrets.UI_PACKAGE_PATH }}
        run: |
          set -euo pipefail
          if [ -n "${UI_PACKAGE_PATH}" ]; then
            root="_ui/${UI_PACKAGE_PATH}"
            root="${root%/}"
            if [ ! -f "${root}/package.json" ]; then
              echo "::error::UI_PACKAGE_PATH is set but ${root}/package.json not found." >&2
              ls -la "${root}" 2>/dev/null || ls -la _ui >&2 || true
              exit 1
            fi
            echo "UI_ROOT=${root}" >> "$GITHUB_ENV"
            exit 0
          fi
          if [ -f _ui/package.json ]; then
            echo "UI_ROOT=_ui" >> "$GITHUB_ENV"
            exit 0
          fi
          mapfile -t pkgs < <(find _ui -maxdepth 4 -name package.json -not -path '*/node_modules/*' 2>/dev/null | sort)
          if [ "${#pkgs[@]}" -eq 0 ]; then
            echo "::error::No package.json under _ui. Set Actions secret UI_REPO (and optional UI_REF, UI_PACKAGE_PATH)." >&2
            ls -la _ui >&2 || true
            exit 1
          fi
          if [ "${#pkgs[@]}" -eq 1 ]; then
            echo "UI_ROOT=$(dirname "${pkgs[0]}")" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "::error::Multiple package.json files under _ui; set secret UI_PACKAGE_PATH to the app folder." >&2
          printf '%s\n' "${pkgs[@]}" >&2
          exit 1

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Install and build frontend
        working-directory: ${{ env.UI_ROOT }}
        run: |
          set -euo pipefail
          if [ -f package-lock.json ] || [ -f npm-shrinkwrap.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
          npm run build

      - name: Copy frontend build into static/
        run: |
          set -euo pipefail
          rm -rf static
          mkdir -p static
          cp -R "${UI_ROOT}/dist/." static/

      - name: Install Databricks CLI
        uses: databricks/setup-cli@v0.296.1

      - name: Require SQL warehouse bundle variable
        run: |
          set -euo pipefail
          wid="${BUNDLE_VAR_SQL_WAREHOUSE_ID:-}"
          wid="$(printf '%s' "$wid" | tr -d '[:space:]')"
          if [ -z "$wid" ]; then
            echo "::error::Set GitHub Environment variable DATABRICKS_BUNDLE_VAR_SQL_WAREHOUSE_ID (SQL warehouse ID)." >&2
            exit 1
          fi

      - name: Deploy bundle
        run: databricks bundle deploy
