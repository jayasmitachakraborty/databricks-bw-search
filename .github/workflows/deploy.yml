name: Deploy Databricks Bundle

on:
  push:
    branches: [main]
  workflow_dispatch:
    inputs:
      target:
        description: "Bundle target (must exist in databricks.yml)"
        required: true
        default: "dev"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Checkout UI repo into ./_ui
        uses: actions/checkout@v4
        with:
          repository: ${{ secrets.UI_REPO }}
          ref: ${{ secrets.UI_REF || 'main' }}
          path: _ui

      - name: Resolve UI package root (monorepo-friendly)
        run: |
          set -euo pipefail
          if [ -f _ui/package.json ]; then
            echo "UI_ROOT=_ui" >> "$GITHUB_ENV"
            exit 0
          fi
          mapfile -t pkgs < <(find _ui -maxdepth 4 -name package.json -not -path '*/node_modules/*' 2>/dev/null | sort)
          if [ "${#pkgs[@]}" -eq 0 ]; then
            echo "::error::No package.json found under _ui after UI checkout. Check secrets UI_REPO / UI_REF and repo layout." >&2
            echo "Top-level under _ui:" >&2
            ls -la _ui >&2 || true
            exit 1
          fi
          if [ "${#pkgs[@]}" -eq 1 ]; then
            pkg="${pkgs[0]}"
            dir="$(dirname "$pkg")"
            echo "UI_ROOT=$dir" >> "$GITHUB_ENV"
            exit 0
          fi
          echo "::error::Multiple package.json files under _ui; set a single UI root or narrow the checkout (found ${#pkgs[@]})." >&2
          printf '%s\n' "${pkgs[@]}" >&2
          exit 1

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Build UI (npm ci if lockfile exists)
        working-directory: ${{ env.UI_ROOT }}
        run: |
          if [ -f package-lock.json ]; then
            npm ci
          else
            npm install --no-audit --no-fund
          fi
          npm run build

      - name: Copy UI dist into backend ./static
        run: |
          rm -rf static
          mkdir -p static
          cp -R "${UI_ROOT}/dist/." static/

      - name: Setup Databricks CLI
        uses: databricks/setup-cli@v0.296.0

      - name: Validate bundle
        run: databricks bundle validate
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_BUNDLE_ENV: ${{ github.event.inputs.target || 'dev' }}

      - name: Deploy bundle
        run: databricks bundle deploy
        env:
          DATABRICKS_HOST: ${{ secrets.DATABRICKS_HOST }}
          DATABRICKS_TOKEN: ${{ secrets.DATABRICKS_TOKEN }}
          DATABRICKS_BUNDLE_ENV: ${{ github.event.inputs.target || 'dev' }}

