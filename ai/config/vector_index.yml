# Embeddings + vector search (adjust for your workspace).

embedding:
  # Model Serving endpoint name in *this* workspace (must match vectors stored in the index).
  endpoint: ""
  batch_size: 32

tables:
  chunks: bw_ai_search.02_silver.bw_company_text_chunks
  embeddings: bw_ai_search.02_silver.bw_company_text_chunk_embeddings

# Optional: Vector Search index / endpoint (override with DATABRICKS_VECTOR_SEARCH_* env vars).
# Names match defaults in notebooks/rag/create_vector_index.py.
vector_index:
  endpoint_name: rag-hybrid-endpoint
  index_name: bw_ai_search.03_gold.gold_rag_company_chunks_index
  # Must match SIZE(embedding) on the gold source table and create_vector_index / VECTOR_SEARCH_EMBEDDING_DIMENSION.
  embedding_dimension: 1536
  # True for direct-access / precomputed-embedding indexes (must pass query_vector; see retrieval.retrieve).
  # For Delta Sync indexes (like this repo’s default), keep this false so queries use query_text (hybrid-ready).
  use_query_vector: false
  # Optional: Mosaic AI Vector Search built-in reranker (DatabricksReranker); columns must be requested in retrieval.
  # rerank_columns:
  #   - chunk_text
