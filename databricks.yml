# Databricks Asset Bundle configuration.
#
# UC table names, vector search, and model endpoints for the Python app are maintained in:
#   - ai/config/vector_index.yml
#   - ai/config/embedding_sources.yml
# See also .env.example for environment variables.
#
# Do NOT put secrets here. Use `.env` / secret scopes for credentials.

bundle:
  name: databricks-bw-search

# Jobs and other bundle resources — see `resources/`
include:
  - resources/*.yml

# GitHub Actions sets DATABRICKS_BUNDLE_ENV=dev (see .github/workflows/deploy.yml).
targets:
  dev:
    default: true

workspace:
  # Optional identifiers (useful for humans and tooling).
  # host: https://<your-workspace-url>
  # profile: DEFAULT
  host: ""
  profile: ""
